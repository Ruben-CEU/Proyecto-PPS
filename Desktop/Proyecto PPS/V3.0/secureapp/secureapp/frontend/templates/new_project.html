{% extends "base.html" %}
{% block title %}Nuevo Proyecto — SecureApp{% endblock %}
{% block header_title %}⚡ SecureApp — Administración{% endblock %}

{% block extra_style %}
<style>
:root { --primary:#7c3aed; --bg:#f5f3ff; --header-bg:#4c1d95; --badge-bg:#7c3aed; }
.form-card { max-width:600px; margin:0 auto; }
.form-group { margin-bottom:1.2rem; }
label { display:block; font-size:.84rem; font-weight:600; color:#475569; margin-bottom:.4rem; }
input[type=text], textarea, select {
    width:100%; padding:.7rem 1rem; border:1.5px solid #cbd5e1;
    border-radius:8px; font-size:.92rem; outline:none; font-family:inherit;
    transition:border-color .2s;
}
input:focus, textarea:focus, select:focus { border-color:#7c3aed; box-shadow:0 0 0 3px #7c3aed22; }
textarea { resize:vertical; min-height:100px; }
.btn-submit { background:#7c3aed; color:white; padding:.75rem 2rem; font-size:.95rem; }
.back-link { color:#7c3aed; text-decoration:none; font-size:.9rem; }
</style>
{% endblock %}

{% block content %}
<div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem">
    <a href="{{ url_for('dashboard') }}" class="back-link">← Volver</a>
    <h2 style="color:#4c1d95;font-size:1.3rem">📋 Nuevo Proyecto</h2>
</div>

<div class="card form-card">
    <form method="POST" action="{{ url_for('new_project') }}">
        <div class="form-group">
            <label for="name">Nombre del proyecto *</label>
            <input type="text" id="name" name="name" required maxlength="128"
                   placeholder="Ej: Migración a la nube">
        </div>
        <div class="form-group">
            <label for="description">Descripción</label>
            <textarea id="description" name="description" maxlength="500"
                      placeholder="Describe el objetivo del proyecto..."></textarea>
        </div>
        <div class="form-group">
            <label for="status">Estado inicial</label>
            <select id="status" name="status">
                <option value="activo">Activo</option>
                <option value="en revisión">En revisión</option>
                <option value="completado">Completado</option>
                <option value="cancelado">Cancelado</option>
            </select>
        </div>
        <div style="display:flex;gap:1rem;align-items:center">
            <button type="submit" class="btn btn-submit">Crear proyecto en MySQL</button>
            <a href="{{ url_for('dashboard') }}" style="color:#94a3b8;font-size:.88rem">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
