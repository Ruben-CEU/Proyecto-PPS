name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ─── Tests unitarios e integración ────────────────────────────────────────
  test:
    name: Tests y Cobertura
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('tests/requirements-test.txt') }}

      - name: Instalar dependencias del sistema (para bcrypt)
        run: sudo apt-get install -y gcc libffi-dev

      - name: Instalar dependencias de test
        run: pip install -r tests/requirements-test.txt

      - name: Tests unitarios e integración — backend y frontend
        env:
          SECRET_KEY: "ci-test-secret-key-32bytes-xxxxx"
          MYSQL_HOST: "localhost"
          MYSQL_DATABASE: "testdb"
          MYSQL_USER: "testuser"
          MYSQL_PASSWORD: "testpass"
          PYTHONPATH: ${{ github.workspace }}/backend:${{ github.workspace }}/frontend
        run: |
          pytest tests/test_backend.py \
                 tests/test_backend_extended.py \
                 tests/test_frontend.py \
            -v --tb=short -p no:warnings

      - name: Cobertura completa con informe
        env:
          SECRET_KEY: "ci-test-secret-key-32bytes-xxxxx"
          MYSQL_HOST: "localhost"
          MYSQL_DATABASE: "testdb"
          MYSQL_USER: "testuser"
          MYSQL_PASSWORD: "testpass"
          PYTHONPATH: ${{ github.workspace }}/backend:${{ github.workspace }}/frontend
        run: |
          pytest tests/test_backend.py \
                 tests/test_backend_extended.py \
                 tests/test_frontend.py \
            --tb=short -p no:warnings \
            --cov=backend --cov=frontend \
            --cov-report=xml --cov-report=term-missing
        continue-on-error: true

      - name: Subir cobertura a Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Publicar resumen de tests en el PR
        if: always()
        env:
          PYTHONPATH: ${{ github.workspace }}/backend:${{ github.workspace }}/frontend
        run: |
          echo "## Resultados de tests" >> $GITHUB_STEP_SUMMARY
          pytest tests/test_backend.py tests/test_backend_extended.py \
                 tests/test_frontend.py \
            --tb=no -q 2>&1 | tail -5 >> $GITHUB_STEP_SUMMARY || true

  # ─── Tests de integración con MySQL real ──────────────────────────────────
  test-mysql:
    name: Tests con MySQL real
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: secureapp
          MYSQL_USER: appuser
          MYSQL_PASSWORD: apppassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root --password=rootpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias del sistema
        run: sudo apt-get install -y gcc libffi-dev

      - name: Instalar dependencias del backend
        run: pip install -r backend/requirements.txt

      - name: Instalar pytest
        run: pip install pytest

      - name: Esperar a que MySQL esté listo
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -P 3306 -u root --password=rootpass \
              --silent 2>/dev/null && echo "MySQL listo" && break
            echo "Esperando MySQL... intento $i/30"
            sleep 2
          done

      - name: Ejecutar tests de integración MySQL real
        env:
          SECRET_KEY: ci-test-secret-key-32bytes-xxxxx
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: "3306"
          MYSQL_DATABASE: secureapp
          MYSQL_USER: appuser
          MYSQL_PASSWORD: apppassword
        run: pytest tests/test_mysql_integration.py -v --tb=short -p no:warnings

  # ─── Análisis de seguridad estático ───────────────────────────────────────
  security:
    name: Análisis de Seguridad (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Bandit
        run: pip install bandit

      - name: Scan backend — severidad media y alta
        run: bandit -r backend/ -f txt -ll || true

      - name: Scan frontend — severidad media y alta
        run: bandit -r frontend/ -f txt -ll || true

      - name: Publicar resumen de seguridad
        if: always()
        run: |
          echo "## Análisis Bandit" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          bandit -r backend/ frontend/ -f txt -ll 2>&1 | tail -20 \
            >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ─── Build Docker ─────────────────────────────────────────────────────────
  docker:
    name: Build y Smoke Test Docker
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build imagen backend
        run: |
          docker build -t secureapp-backend:${{ github.sha }} ./backend
          echo "Backend image built: ${{ github.sha }}"

      - name: Build imagen frontend
        run: |
          docker build -t secureapp-frontend:${{ github.sha }} ./frontend
          echo "Frontend image built: ${{ github.sha }}"

      - name: Preparar .env para smoke test
        run: |
          cat > .env << 'EOF'
          MYSQL_ROOT_PASSWORD=rootpass_ci
          MYSQL_DATABASE=secureapp
          MYSQL_USER=appuser
          MYSQL_PASSWORD=apppassword_ci
          SECRET_KEY=ci-smoke-test-secret-32bytes-xx
          FLASK_SECRET_KEY=ci-flask-secret-key
          EOF

      - name: Smoke test — arrancar stack completo
        run: |
          docker compose up -d
          echo "Esperando a que los servicios arranquen..."

          # Esperar hasta 90s a que el frontend responda
          for i in {1..18}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:5000/login 2>/dev/null || echo "0")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Frontend OK (HTTP $STATUS) tras $((i*5))s"
              break
            fi
            echo "Intento $i/18 — HTTP $STATUS, esperando 5s..."
            sleep 5
          done

          # Verificar health del backend
          HEALTH=$(curl -s http://localhost:5000/login | grep -c "SecureApp" || echo "0")
          echo "Frontend respondió con contenido SecureApp: $HEALTH"

          # Mostrar logs si algo falla
          docker compose logs --tail=20

      - name: Verificar todos los contenedores sanos
        run: |
          docker compose ps
          # Verificar que ningún contenedor está en estado Exit
          EXITED=$(docker compose ps --status exited --format json | wc -l)
          echo "Contenedores detenidos: $EXITED"
          if [ "$EXITED" -gt "1" ]; then
            echo "❌ Hay contenedores detenidos"
            docker compose logs
            exit 1
          fi
          echo "✅ Todos los contenedores corriendo"

      - name: Limpiar
        if: always()
        run: docker compose down -v

  # ─── Deploy (solo rama main) ──────────────────────────────────────────────
  deploy:
    name: Deploy a Producción
    runs-on: ubuntu-latest
    needs: [test, test-mysql, docker, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: |
          echo "## Deploy a producción" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Rama: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Aquí iría: ssh user@servidor 'cd /app && docker compose pull && docker compose up -d'"
