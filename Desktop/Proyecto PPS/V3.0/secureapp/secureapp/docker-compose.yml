version: "3.9"

# =============================================================================
# REQUISITO: "Las aplicaciones se deben crear en contenedores"
# =============================================================================
# Tres servicios:
#   mysql    — base de datos MySQL 8 (no expuesta al exterior)
#   backend  — API REST Flask + bcrypt (solo red interna)
#   frontend — Flask UI (único servicio expuesto, puerto 5000)
#
# Red interna 'appnet': frontend y backend pueden hablar con mysql,
# pero desde fuera solo se accede al frontend en el puerto 5000.
# El backend (5001) y MySQL (3306) NO son accesibles desde el host.
# =============================================================================

services:

  # ─── MySQL 8 ──────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: secureapp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-secureapp}
      MYSQL_USER:          ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-apppassword}
    volumes:
      # Persistencia de datos entre reinicios del contenedor
      - mysql_data:/var/lib/mysql
      # Script SQL de inicialización (charset y colación)
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - appnet
    # MySQL NO expuesto al exterior — solo red interna Docker
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─── Backend API ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: secureapp-backend
    environment:
      SECRET_KEY:      ${SECRET_KEY:-changeme_use_random_32_hex_in_prod}
      MYSQL_HOST:      mysql
      MYSQL_PORT:      3306
      MYSQL_DATABASE:  ${MYSQL_DATABASE:-secureapp}
      MYSQL_USER:      ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD:  ${MYSQL_PASSWORD:-apppassword}
    networks:
      - appnet
    # Backend NO expuesto al exterior — solo el frontend puede llamarlo
    expose:
      - "5001"
    depends_on:
      mysql:
        condition: service_healthy   # Espera a que MySQL esté listo
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5001/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ─── Frontend Web ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: secureapp-frontend
    environment:
      BACKEND_URL:       http://backend:5001
      FLASK_SECRET_KEY:  ${FLASK_SECRET_KEY:-changeme_flask_secret}
      HTTPS:             "false"
    ports:
      - "5000:5000"    # Único puerto expuesto al exterior
    networks:
      - appnet
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

# ─── Volúmenes ──────────────────────────────────────────────────────────────
volumes:
  mysql_data:
    # Los datos de MySQL persisten aunque se borren los contenedores.
    # Para borrar todos los datos: docker compose down -v

# ─── Redes ──────────────────────────────────────────────────────────────────
networks:
  appnet:
    driver: bridge
    # Red privada: los servicios se comunican por nombre (mysql, backend, frontend)
    # Desde fuera solo es accesible lo que tenga 'ports:' definido.
