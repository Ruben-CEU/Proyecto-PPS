{% extends "base.html" %}
{% block title %}Login — SecureApp{% endblock %}

{% block extra_style %}
<style>
.login-wrap { display:flex; justify-content:center; align-items:center; min-height:85vh; }
.login-card { background:white; padding:2.5rem; border-radius:16px; box-shadow:0 4px 28px rgba(0,0,0,.12); width:100%; max-width:420px; }
.logo { text-align:center; font-size:3.5rem; margin-bottom:.5rem; }
.login-card h2 { text-align:center; margin-bottom:1.8rem; font-size:1.6rem; color:#1e293b; }
.form-group { margin-bottom:1.1rem; }
label { display:block; font-size:.82rem; font-weight:600; color:#475569; margin-bottom:.35rem; }
input[type=text], input[type=password] { width:100%; padding:.75rem 1rem; border:1.5px solid #cbd5e1; border-radius:8px; font-size:.95rem; outline:none; transition:border-color .2s; }
input:focus { border-color:#2563eb; box-shadow:0 0 0 3px #2563eb22; }
.btn-login { width:100%; padding:.85rem; font-size:1rem; margin-top:.5rem; background:#2563eb; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:700; letter-spacing:.3px; transition:background .2s; }
.btn-login:hover { background:#1d4ed8; }
.demo-creds { margin-top:1.4rem; background:#f8fafc; border-radius:10px; padding:.9rem 1.1rem; font-size:.8rem; color:#64748b; border:1px solid #e2e8f0; }
.demo-creds strong { color:#334155; display:block; margin-bottom:.4rem; }
.demo-creds code { background:#e2e8f0; padding:.1rem .35rem; border-radius:4px; font-size:.78rem; }
.db-note { text-align:center; margin-top:1rem; font-size:.75rem; color:#94a3b8; }
</style>
{% endblock %}

{% block content %}
<div class="login-wrap">
    <div class="login-card">
        <div class="logo">🔒</div>
        <h2>SecureApp</h2>
        <form method="POST" action="{{ url_for('login') }}" autocomplete="off">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required
                       maxlength="64" autocomplete="username" placeholder="Tu nombre de usuario">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required
                       maxlength="128" autocomplete="current-password" placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login">Iniciar Sesión</button>
        </form>
        <div class="demo-creds">
            <strong>🧪 Credenciales de prueba</strong>
            Admin: <code>admin</code> / <code>Admin1234!</code><br><br>
            Usuario: <code>usuario</code> / <code>User1234!</code>
        </div>
        <p class="db-note">🗄️ Autenticado contra MySQL · Contraseñas con bcrypt</p>
    </div>
</div>
{% endblock %}
